<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Barcode Scanner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }

#camera-wrap { position: relative; width: 100vw; height: 100vh; }
#video { width: 100%; height: 100%; object-fit: cover; }

#scan-frame {
  position: absolute;
  left: 10%; right: 10%;
  top: 50%; transform: translateY(-50%);
  height: 160px;
  border: 2px solid rgba(255,255,255,.3);
  border-radius: 8px;
  pointer-events: none;
}
#scan-frame::before { content:''; position:absolute; top:-2px; left:-2px; width:24px; height:24px; border:3px solid red; border-right:none; border-bottom:none; }
#scan-frame::after  { content:''; position:absolute; bottom:-2px; right:-2px; width:24px; height:24px; border:3px solid red; border-left:none; border-top:none; }

#scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 2px;
  background: red;
  box-shadow: 0 0 8px 2px rgba(255,0,0,.8);
  top: 50%;
  animation: scan 2s ease-in-out infinite;
}
@keyframes scan {
  0%   { transform: translateY(-70px); }
  50%  { transform: translateY(70px); }
  100% { transform: translateY(-70px); }
}

#status {
  position: absolute;
  bottom: 40px; left: 0; right: 0;
  text-align: center;
  font-size: 14px;
  color: rgba(255,255,255,.8);
  letter-spacing: 1px;
  padding: 0 20px;
}

#result-screen {
  display: none;
  position: fixed; inset: 0;
  background: #111;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 32px;
  text-align: center;
}
#result-barcode { font-size: 28px; font-weight: 800; letter-spacing: 3px; word-break: break-all; }
#copy-btn { padding: 14px 32px; background: red; color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 700; cursor: pointer; width: 100%; }
#scan-again { color: rgba(255,255,255,.5); font-size: 14px; background: none; border: 1px solid rgba(255,255,255,.2); border-radius: 50px; padding: 12px 28px; cursor: pointer; color: white; width: 100%; }
</style>
</head>
<body>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="scan-frame"><div id="scan-line"></div></div>
  <div id="status">Laden...</div>
</div>

<div id="result-screen">
  <div style="font-size:12px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase">Barcode gevonden</div>
  <div id="result-barcode"></div>
  <button id="copy-btn">📋 Kopieer</button>
  <button id="scan-again">↺ Opnieuw scannen</button>
</div>

<script type="text/javascript" src="https://unpkg.com/@zxing/browser@0.1.5/umd/index.min.js"></script>
<script>
let codeReader = null;

async function startScanner() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('camera-wrap').style.display = 'block';
  document.getElementById('status').textContent = 'Camera toestemming vragen...';

  try {
    // Vraag toestemming
    await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(s => s.getTracks().forEach(t => t.stop()));

    document.getElementById('status').textContent = 'Richt op een barcode...';

    codeReader = new ZXingBrowser.BrowserMultiFormatReader();

    const devices = await ZXingBrowser.BrowserMultiFormatReader.listVideoInputDevices();
    const back = devices.find(d =>
      d.label.toLowerCase().includes('back') ||
      d.label.toLowerCase().includes('rear') ||
      d.label.toLowerCase().includes('environment')
    ) || devices[devices.length - 1];

    await codeReader.decodeFromVideoDevice(
      back?.deviceId,
      document.getElementById('video'),
      (result, err) => {
        if (result) {
          codeReader.reset();
          toonResultaat(result.getText());
        }
      }
    );

  } catch(err) {
    if (err.name === 'NotAllowedError') {
      document.getElementById('status').textContent = '❌ Toestemming geweigerd. Sta camera toe in je browser.';
    } else {
      document.getElementById('status').textContent = '❌ ' + err.message;
    }
  }
}

function toonResultaat(barcode) {
  document.getElementById('camera-wrap').style.display = 'none';
  document.getElementById('result-barcode').textContent = barcode;
  document.getElementById('result-screen').style.display = 'flex';
  if (navigator.vibrate) navigator.vibrate(100);
}

document.getElementById('copy-btn').onclick = () => {
  const b = document.getElementById('result-barcode').textContent;
  navigator.clipboard.writeText(b).then(() => {
    document.getElementById('copy-btn').textContent = '✓ Gekopieerd!';
    setTimeout(() => document.getElementById('copy-btn').textContent = '📋 Kopieer', 2000);
  });
};

document.getElementById('scan-again').onclick = startScanner;

// Start
window.addEventListener('load', startScanner);
</script>
</body>
</html>
