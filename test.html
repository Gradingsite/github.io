<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Barcode Scanner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; }

#camera-wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

#scan-line {
  position: absolute;
  left: 10%;
  right: 10%;
  height: 2px;
  background: red;
  box-shadow: 0 0 8px 2px rgba(255,0,0,.8);
  top: 50%;
  animation: scan 2s ease-in-out infinite;
}

@keyframes scan {
  0%   { transform: translateY(-80px); opacity: 1; }
  50%  { transform: translateY(80px);  opacity: 1; }
  100% { transform: translateY(-80px); opacity: 1; }
}

#scan-frame {
  position: absolute;
  left: 10%;
  right: 10%;
  top: 50%;
  transform: translateY(-50%);
  height: 160px;
  border: 2px solid rgba(255,255,255,.4);
  border-radius: 8px;
}

/* hoekjes */
#scan-frame::before, #scan-frame::after {
  content: '';
  position: absolute;
  width: 24px;
  height: 24px;
  border-color: #f00;
  border-style: solid;
}
#scan-frame::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; }
#scan-frame::after  { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; }

#status {
  position: absolute;
  bottom: 40px;
  left: 0; right: 0;
  text-align: center;
  font-size: 14px;
  color: rgba(255,255,255,.7);
  letter-spacing: 1px;
}

#result-screen {
  display: none;
  position: fixed;
  inset: 0;
  background: #111;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 32px;
}

#result-barcode {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 3px;
  text-align: center;
  word-break: break-all;
}

#copy-btn {
  padding: 14px 32px;
  background: #e00;
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
}

#scan-again {
  color: rgba(255,255,255,.5);
  font-size: 13px;
  background: none;
  border: none;
  cursor: pointer;
  text-decoration: underline;
}
</style>
</head>
<body>

<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="scan-frame">
    <div id="scan-line"></div>
  </div>
  <div id="status">Richt de camera op een barcode</div>
</div>

<div id="result-screen">
  <div style="font-size:13px;color:rgba(255,255,255,.5);letter-spacing:2px;text-transform:uppercase">Barcode gevonden</div>
  <div id="result-barcode"></div>
  <button id="copy-btn" onclick="copyBarcode()">📋 Kopieer</button>
  <button id="scan-again" onclick="startScanner()">↺ Opnieuw scannen</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/zxing-js/0.20.0/index.min.js"></script>
<script>
let codeReader = null;
let stream = null;

async function startScanner() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('camera-wrap').style.display = 'block';

  try {
    codeReader = new ZXingBrowser.BrowserMultiFormatReader();

    const devices = await ZXingBrowser.BrowserMultiFormatReader.listVideoInputDevices();
    // Pak de achterste camera als die er is
    const device = devices.find(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('achter') || d.label.toLowerCase().includes('rear')) || devices[devices.length - 1];

    await codeReader.decodeFromVideoDevice(device?.deviceId, 'video', (result, err) => {
      if (result) {
        const barcode = result.getText();
        codeReader.reset();
        toonResultaat(barcode);
      }
    });

  } catch(err) {
    document.getElementById('status').textContent = 'Camera niet beschikbaar: ' + err.message;
  }
}

function toonResultaat(barcode) {
  document.getElementById('camera-wrap').style.display = 'none';
  document.getElementById('result-barcode').textContent = barcode;
  document.getElementById('result-screen').style.display = 'flex';
  // Vibreer als het apparaat dat ondersteunt
  if(navigator.vibrate) navigator.vibrate(100);
}

function copyBarcode() {
  const barcode = document.getElementById('result-barcode').textContent;
  navigator.clipboard.writeText(barcode).then(() => {
    document.getElementById('copy-btn').textContent = '✓ Gekopieerd!';
    setTimeout(() => document.getElementById('copy-btn').textContent = '📋 Kopieer', 2000);
  });
}

startScanner();
</script>
</body>
</html>
